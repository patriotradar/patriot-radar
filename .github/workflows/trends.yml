name: Patriot Trends Scanner

on:
  schedule:
  - cron: "13 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run trends scanner
        run: python trends.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: patriot-radar-results
          path: |
            results.txt
            results.json

      - name: Keep workflow active
        run: |
          date > last-run.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last-run.txt
          git commit -m "Update scanner timestamp" || echo "No changes"
          git push