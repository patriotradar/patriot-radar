name: Trend Intelligence Scan

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to scan"
        required: false
        default: "general"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply trend intelligence schema (optional)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            python scripts/apply_trend_feed_schema.py || true
            python scripts/apply_trend_feed_schema.py --sql sql/trend_intelligence_history.sql || true
          fi
        continue-on-error: true

      - name: Run multi-source trend intelligence scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TREND_HISTORY_TABLE: trend_intelligence_history
          TREND_SCAN_TABLE: trend_intelligence_scans
          TREND_RECOMMENDATIONS_TABLE: trend_recommendations
          TREND_PROVIDER_TIMEOUT_SEC: "90"
        run: |
          NICHE="${{ github.event.inputs.niche || 'general' }}"
          python scripts/run_trend_intelligence_scan.py --niche "$NICHE" --json > trend_scan_report.json
          cat trend_scan_report.json

      - name: Upload scan report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trend-scan-report
          path: trend_scan_report.json
          retention-days: 7

      - name: Validate scan produced data
        run: |
          python -c "
          import json, sys
          with open('trend_scan_report.json') as f:
              r = json.load(f)
          online = r.get('providers_online', [])
          trends = r.get('trend_count', 0)
          opps = r.get('opportunity_count', 0)
          print(f'online={len(online)} trends={trends} opportunities={opps}')
          if not online:
              print('WARNING: no providers online')
          if trends == 0 and opps == 0 and not online:
              sys.exit(1)
          "
